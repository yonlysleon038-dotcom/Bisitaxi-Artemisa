<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiciTaxi Artemisa</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --accent: #fbc02d;
            --bg: #f4f6f8;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        header {
            text-align: center;
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 1.6rem;
        }

        header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .driver-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 5px solid var(--primary);
        }

        .driver-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #eee;
            flex-shrink: 0;
        }

        .driver-info {
            flex-grow: 1;
        }

        .driver-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            color: #111;
        }

        .driver-info p {
            margin: 2px 0;
            font-size: 0.85rem;
            color: #666;
        }

        .badge {
            display: inline-block;
            background: #e8f5e9;
            color: var(--primary-dark);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 4px;
        }

        .btn-order {
            display: block;
            width: 100%;
            text-align: center;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .btn-order:active {
            background: var(--primary-dark);
        }

        .driver-banner {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-top: 25px;
        }

        .driver-banner h4 {
            margin: 0 0 8px 0;
            color: #856404;
        }

        .driver-banner p {
            margin: 0 0 12px 0;
            font-size: 0.85rem;
            color: #856404;
        }

        .btn-join {
            display: inline-block;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚲 BiciTaxi Artemisa</h1>
        <p>Tu transporte rápido y confiable en la ciudad</p>
    </header>

    <div id="drivers-list"></div>

    <div class="driver-banner">
        <h4>¿Eres chofer de Bicitaxi?</h4>
        <p>Anúnciate en nuestra plataforma y recibe clientes directo a tu WhatsApp.</p>
        <a href="https://wa.me/5358754184?text=Hola%20Yonlys,%20quiero%20anunciar%20mi%20bicitaxi%20en%20la%20p%C3%A1gina" class="btn-join" target="_blank">Unirme como Chofer 📲</a>
    </div>
</div>

<script>
    // Lista controlada por ti (Administrador)
    const drivers = [
        {
            name: "Yonlys",
            phone: "5358754184",
            zone: "Municipio Artemisa",
            rate: "A convenir",
            photo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
        }
    ];

    function renderDrivers() {
        const list = document.getElementById('drivers-list');
        list.innerHTML = '';

        drivers.forEach(driver => {
            const card = document.createElement('div');
            card.className = 'driver-card';
            
            const photoUrl = driver.photo ? driver.photo : 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';

            card.innerHTML = `
                <img src="${photoUrl}" class="driver-avatar" alt="${driver.name}">
                <div class="driver-info">
                    <h3>${driver.name}</h3>
                    <p>📍 <b>Zona:</b> ${driver.zone}</p>
                    <p>💰 <b>Tarifa:</b> ${driver.rate}</p>
                    <span class="badge">Disponible</span>
                    <a href="https://wa.me/${driver.phone}?text=Hola%20${driver.name},%20necesito%20un%20viaje%20en%20bicitaxi." class="btn-order" target="_blank">Pedir Viaje 🚖</a>
                </div>
            `;
            list.appendChild(card);
        });
    }

    renderDrivers();
</script>

</body>
</html>
