
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiciTaxi Artemisa</title>
    
    <!-- Configuración PWA (Manifiesto e Iconos) -->
    <meta name="theme-color" content="#2e7d32">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BiciTaxi">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3198/3198344.png">

    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --accent: #fbc02d;
            --bg: #f4f6f8;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        header {
            text-align: center;
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 1.6rem;
        }

        header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .pwa-install-banner {
            display: none;
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            margin-bottom: 15px;
        }

        .pwa-install-banner p {
            margin: 0 0 8px 0;
            font-size: 0.85rem;
            color: var(--primary-dark);
            font-weight: bold;
        }

        .btn-install {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .driver-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 5px solid var(--primary);
        }

        .driver-card.offline {
            border-left-color: #9e9e9e;
            opacity: 0.7;
        }

        .driver-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #eee;
            flex-shrink: 0;
        }

        .driver-info {
            flex-grow: 1;
        }

        .driver-info h3 {
            margin: 0 0 2px 0;
            font-size: 1.1rem;
            color: #111;
        }

        .rating-box {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #f57c00;
            font-weight: bold;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .rating-box .stars {
            color: #ffc107;
        }

        .rating-box .reviews-count {
            color: #757575;
            font-size: 0.75rem;
            font-weight: normal;
        }

        .btn-review {
            color: #1e88e5;
            text-decoration: underline;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }

        .driver-info p {
            margin: 2px 0;
            font-size: 0.85rem;
            color: #666;
        }

        .badge {
            display: inline-block;
            background: #e8f5e9;
            color: var(--primary-dark);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 4px;
        }

        .badge.offline {
            background: #eeeeee;
            color: #757575;
        }

        .btn-order {
            display: block;
            width: 100%;
            text-align: center;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .btn-order.disabled {
            background: #cccccc;
            pointer-events: none;
            cursor: not-allowed;
        }

        .driver-banner {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-top: 25px;
        }

        .driver-banner h4 {
            margin: 0 0 8px 0;
            color: #856404;
        }

        .driver-banner p {
            margin: 0 0 12px 0;
            font-size: 0.85rem;
            color: #856404;
        }

        .btn-join {
            display: inline-block;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚲 BiciTaxi Artemisa</h1>
        <p>Tu transporte rápido y confiable en la ciudad</p>
    </header>

    <!-- Banner para instalar PWA -->
    <div id="pwa-banner" class="pwa-install-banner">
        <p>📲 ¡Instala la App de BiciTaxi en tu teléfono!</p>
        <button id="btn-install-app" class="btn-install">Instalar aplicación</button>
    </div>

    <div id="drivers-list"></div>

    <div class="driver-banner">
        <h4>¿Eres chofer de Bicitaxi?</h4>
        <p>Anúnciate en nuestra plataforma y recibe clientes directo a tu WhatsApp.</p>
        <a href="https://wa.me/5358754184?text=Hola%20Yonlys,%20quiero%20anunciar%20mi%20bicitaxi%20en%20la%20p%C3%A1gina" class="btn-join" target="_blank">Unirme como Chofer 📲</a>
    </div>
</div>

<script>
    const adminPhone = "5358754184"; // Tu WhatsApp para recibir valoraciones

    // Lista de choferes
    const drivers = [
        {
            id: "yonlys_01",
            name: "Yonlys",
            phone: "5358754184",
            zone: "Municipio Artemisa",
            rate: "A convenir",
            photo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
            rating: 5.0,
            reviewsCount: 18,
            startHour: 6,  // 6:00 AM
            endHour: 20    // 8:00 PM
        }
    ];

    function renderDrivers() {
        const list = document.getElementById('drivers-list');
        list.innerHTML = '';

        const currentHour = new Date().getHours();

        drivers.forEach(driver => {
            const card = document.createElement('div');
            const isWorkingTime = currentHour >= driver.startHour && currentHour < driver.endHour;
            
            card.className = `driver-card ${isWorkingTime ? '' : 'offline'}`;
            
            const photoUrl = driver.photo ? driver.photo : 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
            const reviewUrl = `https://wa.me/${adminPhone}?text=Hola%20Yonlys,%20quiero%20dejar%20una%20calificaci%C3%B3n%20para%20el%20chofer%20${encodeURIComponent(driver.name)}`;

            card.innerHTML = `
                <img src="${photoUrl}" class="driver-avatar" alt="${driver.name}">
                <div class="driver-info">
                    <h3>${driver.name}</h3>
                    <div class="rating-box">
                        <span class="stars">★ ${driver.rating.toFixed(1)}</span>
                        <span class="reviews-count">(${driver.reviewsCount})</span>
                        <a href="${reviewUrl}" target="_blank" class="btn-review">Calificar 💬</a>
                    </div>
                    <p>📍 <b>Zona:</b> ${driver.zone}</p>
                    <p>💰 <b>Tarifa:</b> ${driver.rate}</p>
                    <span class="badge ${isWorkingTime ? '' : 'offline'}">${isWorkingTime ? 'Disponible' : 'Fuera de servicio'}</span>
                    <a href="https://wa.me/${driver.phone}?text=Hola%20${driver.name},%20necesito%20un%20viaje%20en%20bicitaxi." 
                       class="btn-order ${isWorkingTime ? '' : 'disabled'}" 
                       target="_blank">
                       ${isWorkingTime ? 'Pedir Viaje 🚖' : 'No disponible'}
                    </a>
                </div>
            `;
            list.appendChild(card);
        });
    }

    renderDrivers();

    // Registro del Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registrado', reg))
                .catch(err => console.log('Error SW:', err));
        });
    }
</script>

</body>
</html>
